# MinKV CI - Enhanced and Optimized by kvrocks best practices
name: MinKV CI - Enhanced

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

# Concurrency control — avoids redundant runs for PRs.
# NOTE: Intentionally keeping only PR-level cancellation.
#       Auto-push removed (see lint job), so workflow-recursion risk is eliminated.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # Precondition Job: Determines whether this is a docs-only change.
  # All downstream jobs always run (so required checks appear for branch protection),
  # but they early-exit at step 0 if docs_only == true.
  precondition:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.result.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: .github/config/changes.yml
      - id: result
        run: |
          echo "docs_only=${{ fromJSON(steps.changes.outputs.all_count) == fromJSON(steps.changes.outputs.docs_count) && fromJSON(steps.changes.outputs.docs_count) > 0 }}" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────
  # build-and-test (Debug / Release)
  #
  # CRITICAL: No `if:` skip on the job level!
  #   GitHub Branch Protection requires the check to *exist* (success/skipped/failure).
  #   A completely absent job → "Expected — Waiting for status to be reported" forever.
  #
  #   Instead, we add an early-exit step at the top so that docs-only PRs
  #   still produce a passing check status.
  # ─────────────────────────────────────────────────────────────────
  build-and-test:
    needs: precondition
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release, Debug]

    steps:
      # ── Early exit for docs-only changes ──
      # Job is always created → required check appears.
      # Docs-only PR exits immediately with status=success.
      - name: Skip for docs-only changes
        if: ${{ needs.precondition.outputs.docs_only == 'true' }}
        run: echo "Docs-only change, skipping." && exit 0

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build ccache \
            librapidcheck-dev nlohmann-json3-dev \
            clang-tidy cppcheck valgrind

      # Coredump Setup: Enables coredump collection on crash.
      - name: Setup coredump
        run: |
          echo "$(pwd)/coredumps/corefile-%e-%p-%t" | sudo tee /proc/sys/kernel/core_pattern
          mkdir -p coredumps
          ulimit -c unlimited

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          # KEY DESIGN: Only build-system files in the hash key.
          #   Source file changes should NOT invalidate the entire cache;
          #   ccache itself handles per-file recompilation internally.
          key: ${{ runner.os }}-ccache-${{ matrix.build_type }}-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.build_type }}-

      - name: Configure (Debug with sanitizers)
        if: matrix.build_type == 'Debug'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_FLAGS_DEBUG="-fsanitize=address,undefined -fno-omit-frame-pointer -g" \
            -DCMAKE_EXE_LINKER_FLAGS_DEBUG="-fsanitize=address,undefined"

      - name: Configure (Release)
        if: matrix.build_type == 'Release'
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build all targets
        run: |
          cmake --build build --parallel $(nproc) --target all

      - name: Run all tests and benchmarks
        env:
          ASAN_OPTIONS: abort_on_error=1:detect_leaks=1:strict_string_checks=1:alloc_dealloc_mismatch=1:fast_unwind_on_malloc=0
          UBSAN_OPTIONS: print_stacktrace=1
        run: |
          set -euo pipefail
          echo "====================================="
          echo "🚀 Starting automated testing pipeline..."
          echo "====================================="
          
          FAILED=0

          # Phase 1: Run all unit tests (_test suffix)
          echo "🧪 Phase 1: Running all unit tests (_test suffix)"
          for test_bin in build/bin/*_test; do
            if [ -x "$test_bin" ]; then
              echo "-------------------------------------"
              echo "🧪 Running Test: $(basename $test_bin)"
              if ! timeout 60s "$test_bin"; then
                echo "⚠️  Test $(basename $test_bin) failed or timed out"
                FAILED=1
              fi
            fi
          done

          # Phase 2: Run stress benchmarks
          echo "====================================="
          echo "🔥 Phase 2: Running stress benchmarks"
          echo "====================================="
          
          if [ -x build/bin/comprehensive_benchmark ]; then
            echo "🔥 Running Comprehensive Stress Benchmark (Timeout 30s)"
            timeout 30s build/bin/comprehensive_benchmark --iterations=1000 || echo "✅ Benchmark finished or timed out safely."
          fi
          
          if [ -x build/bin/test_vector_integration ]; then
            echo "🤖 Running Vector Integration Test"
            if ! timeout 60s build/bin/test_vector_integration; then
              echo "⚠️  test_vector_integration failed or timed out"
              FAILED=1
            fi
          fi
          
          if [ -x build/bin/wal_performance_benchmark ]; then
            echo "📊 Running WAL Performance Benchmark"
            timeout 30s build/bin/wal_performance_benchmark --duration=5 || echo "✅ WAL benchmark completed"
          fi
          
          if [ -x build/bin/benchmark_vector ]; then
            echo "⚡ Running Vector Benchmark"
            timeout 30s build/bin/benchmark_vector --queries=1000 || echo "✅ Vector benchmark completed"
          fi

          # Phase 3: Run all test_* binaries (including Graph tests)
          echo "====================================="
          echo "🧩 Phase 3: Running all test_* binaries"
          echo "====================================="
          for test_bin in build/bin/test_*; do
            if [ -x "$test_bin" ] && [ "$(basename $test_bin)" != "test_vector_integration" ]; then
              echo "-------------------------------------"
              echo "🧩 Running: $(basename $test_bin)"
              if ! timeout 90s "$test_bin"; then
                echo "⚠️  Test $(basename $test_bin) failed or timed out"
                FAILED=1
              fi
            fi
          done

          echo "====================================="
          echo "✅ All tests completed!"
          echo "====================================="

          if [ "$FAILED" -ne 0 ]; then
            echo "❌ Some tests failed. See logs above."
            exit 1
          fi

      # REMOVED: Sanitizer/Crash grep scan.
      #   ASan/UBSan already exit with non-zero code when they detect errors.
      #   Grepping build/ for "AddressSanitizer:" is unreliable (reports go to stderr,
      #   not build directory) and produces false negatives/positives.

      - name: Generate coverage report
        if: matrix.build_type == 'Debug'
        run: |
          echo "Generating coverage report..."
          # Placeholder for coverage commands

      # Archive Artifacts: Uploads binaries and coredumps on failure.
      - name: Archive build outputs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-artifacts-${{ matrix.build_type }}
          path: |
            build/CMakeCache.txt
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
            build/Testing/**/*.xml
            coredumps/*
            build/bin/*

  # ─────────────────────────────────────────────────────────────────
  # lint
  #
  # CRITICAL CHANGES:
  #   1. No `if:` skip on the job level (same reason as build-and-test).
  #   2. Auto-push REMOVED.
  #        - Before: clang-format auto-fixes → git commit → git push
  #        - Problem: push triggers new workflow → cancel-in-progress kills old run
  #          → required check never stabilizes → infinite pending
  #        - Now: only verify with --dry-run --Werror
  #          (developers run clang-format locally to fix)
  #   3. `permissions: contents: write` → `permissions: contents: read`
  # ─────────────────────────────────────────────────────────────────
  lint:
    needs: precondition
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # ── Early exit for docs-only changes ──
      - name: Skip for docs-only changes
        if: ${{ needs.precondition.outputs.docs_only == 'true' }}
        run: echo "Docs-only change, skipping." && exit 0

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Install Linting Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format-18 cppcheck
      - name: Verify clang-format
        run: |
          find src tests \( -name '*.cpp' -o -name '*.h' \) -print0 | xargs -0 clang-format-18 --dry-run --Werror
      - name: Run cppcheck
        run: |
          cppcheck src/ --suppressions-list=.cppcheckignore --enable=warning,performance --error-exitcode=1

  # ===========================================================================
  # [DEPRECATED] required job — replaced by native branch protection checks
  #
  # The old `required` job used shell exit codes to manually evaluate upstream
  # job statuses. GitHub branch protection does NOT understand custom shell
  # logic; it only tracks native job states (success/failure/skipped).
  # This caused "Expected — Waiting for status to be reported" to hang forever.
  #
  # CURRENT STRATEGY (applied above):
  #   - Jobs are ALWAYS created (no `if:` skip on job level).
  #   - For docs-only PRs, an early-exit step runs `exit 0` at the very top.
  #   - GitHub sees the check exist with status=success → branch protection passes.
  #
  # If you ever need a single required check again, use GitHub's native
  # `${{ !cancelled() }}` pattern with `needs` result propagation instead of
  # manual exit-code branching.
  # ===========================================================================
